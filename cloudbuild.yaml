timeout: 1200s

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/orion:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/orion:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/orion:$COMMIT_SHA

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/orion:latest

images:
  - gcr.io/$PROJECT_ID/orion:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/orion:latest
